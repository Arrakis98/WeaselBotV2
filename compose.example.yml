services:
  bot:
    build:
      context: .
    command: ["python", "-m", "weasel_bot_v2"]
    environment:
      DISCORD_TOKEN: "${DISCORD_TOKEN:-}"
      DISCORD_TEST_GUILD_ID: "${DISCORD_TEST_GUILD_ID:-}"
      LAVALINK_HOST: lavalink
      LAVALINK_PORT: "2333"
      LAVALINK_PASSWORD: "${LAVALINK_PASSWORD:-change-me-locally}"
    depends_on:
      - lavalink
    networks:
      - weasel-internal
      - weasel-egress
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # Replace ./music in a private local compose file if your host library lives elsewhere.
      - ./music:/music:ro
    restart: unless-stopped

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    environment:
      SERVER_PORT: "2333"
      LAVALINK_SERVER_PASSWORD: "${LAVALINK_PASSWORD:-change-me-locally}"
    networks:
      - weasel-internal
      - weasel-egress
    volumes:
      - ./lavalink/application.example.yml:/opt/Lavalink/application.yml:ro
      # Lavalink must see the same container path as the bot for local playback.
      - ./music:/music:ro
    restart: unless-stopped

networks:
  weasel-internal:
    internal: true
  weasel-egress:
