services:
  bot:
    build:
      context: .
    command: ["python", "-m", "weasel_bot_v2"]
    environment:
      DISCORD_TOKEN: "${DISCORD_TOKEN:-}"
      DISCORD_TEST_GUILD_ID: "${DISCORD_TEST_GUILD_ID:-}"
      LAVALINK_HOST: lavalink
      LAVALINK_PORT: "2333"
      LAVALINK_PASSWORD: "${LAVALINK_PASSWORD:-change-me-locally}"
    depends_on:
      - lavalink
    networks:
      - weasel-internal
      - weasel-egress
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      # Lavalink and normal playback use /music read-only.
      - ${MUSIC_LIBRARY_HOST_PATH:-./music}:/music:ro
      # Bot-only writable management mounts for reversible quarantine operations.
      - ${MUSIC_LIBRARY_HOST_PATH:-./music}:/library_admin/music:rw
      - ${QUARANTINE_HOST_PATH:-./quarantine/super_disliked}:/library_admin/quarantine/super_disliked:rw
    restart: unless-stopped

  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4
    environment:
      SERVER_PORT: "2333"
      LAVALINK_SERVER_PASSWORD: "${LAVALINK_PASSWORD:-change-me-locally}"
    networks:
      - weasel-internal
      - weasel-egress
    volumes:
      - ./lavalink/application.example.yml:/opt/Lavalink/application.yml:ro
      # Lavalink must see the same container path as the bot for local playback.
      - ${MUSIC_LIBRARY_HOST_PATH:-./music}:/music:ro
    restart: unless-stopped

networks:
  weasel-internal:
    internal: true
  weasel-egress:
