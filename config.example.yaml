bot:
  name: "Weasel Bot V2"
  command_prefix: null
  slash_commands_first: true
  test_guild_id_env: "DISCORD_TEST_GUILD_ID"

paths:
  data_dir: "/app/data"
  music_library: "/music"
  logs_dir: "/app/logs"

database:
  path: "/app/data/weasel-bot-v2.sqlite"

features:
  music: false
  local_library: false
  playlists: false
  history: false
  legacy_json_import: false
  rich_discord_ui: false
  ai: false

personality:
  enabled: false
  playful_responses: false
  snark_level: "low"

chaos_mode:
  enabled: false
  require_admin: true
  cooldown_seconds: 300
  allow_queue_shuffle: false
  allow_surprise_tracks: false

lavalink:
  host: "lavalink"
  port: 2333
  host_env: "LAVALINK_HOST"
  port_env: "LAVALINK_PORT"
  password_env: "LAVALINK_PASSWORD"
  secure: false
