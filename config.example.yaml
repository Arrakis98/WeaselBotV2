bot:
  name: "Weasel Bot V2"
  command_prefix: null
  slash_commands_first: true
  test_guild_id_env: "DISCORD_TEST_GUILD_ID"

paths:
  # Runtime data is ignored by Git. In Docker this resolves under /app.
  data_dir: "data"
  music_library: "/music"
  logs_dir: "logs"

library_moderation:
  admin_music_path: "/library_admin/music"
  quarantine_path: "/library_admin/quarantine/super_disliked"
  auto_quarantine_superdislike: false

database:
  # Default local SQLite database path. Do not commit generated database files.
  path: "data/weasel.db"

features:
  music: true
  local_library: true
  web_playback: false
  playlists: false
  history: false
  ratings: false
  legacy_json_import: false
  rich_discord_ui: false
  ai: false

personality:
  enabled: false
  playful_responses: false
  snark_level: "low"

chaos_mode:
  enabled: false
  require_admin: true
  cooldown_seconds: 300
  allow_queue_shuffle: false
  allow_surprise_tracks: false

lavalink:
  host: "lavalink"
  port: 2333
  host_env: "LAVALINK_HOST"
  port_env: "LAVALINK_PORT"
  password_env: "LAVALINK_PASSWORD"
  secure: false
  timeout_seconds: 30
