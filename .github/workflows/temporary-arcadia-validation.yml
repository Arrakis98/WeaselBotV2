name: Temporary Arcadia validation

on:
  push:
    branches:
      - phase-6-4-manifest-integration
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  validate-and-apply:
    runs-on: ubuntu-latest
    steps:
      - name: Check out integration branch
        uses: actions/checkout@v4
        with:
          ref: phase-6-4-manifest-integration
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install project and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'

      - name: Apply validated candidate fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("src/weasel_bot_v2/services/arcadia_manifest.py")
          text = path.read_text(encoding="utf-8")
          old = '''def _integer(value: object, label: str) -> int:
              if isinstance(value, bool):
                  raise ArcadiaManifestError(f"{label} must be an integer.")
              try:
                  return int(value)
              except (TypeError, ValueError) as exc:
                  raise ArcadiaManifestError(f"{label} must be an integer.") from exc


          def _number(value: object, label: str) -> float:
              if isinstance(value, bool):
                  raise ArcadiaManifestError(f"{label} must be a number.")
              try:
                  return float(value)
              except (TypeError, ValueError) as exc:
                  raise ArcadiaManifestError(f"{label} must be a number.") from exc
          '''
          new = '''def _integer(value: object, label: str) -> int:
              if isinstance(value, bool):
                  raise ArcadiaManifestError(f"{label} must be an integer.")
              if isinstance(value, int):
                  return value
              if isinstance(value, str):
                  try:
                      return int(value)
                  except ValueError as exc:
                      raise ArcadiaManifestError(f"{label} must be an integer.") from exc
              raise ArcadiaManifestError(f"{label} must be an integer.")


          def _number(value: object, label: str) -> float:
              if isinstance(value, bool):
                  raise ArcadiaManifestError(f"{label} must be a number.")
              if isinstance(value, (int, float)):
                  return float(value)
              if isinstance(value, str):
                  try:
                      return float(value)
                  except ValueError as exc:
                      raise ArcadiaManifestError(f"{label} must be a number.") from exc
              raise ArcadiaManifestError(f"{label} must be a number.")
          '''
          if old in text:
              path.write_text(text.replace(old, new, 1), encoding="utf-8")
          elif new not in text:
              raise SystemExit("Expected conversion helper block was not found")
          PY

          ruff format \
            src/weasel_bot_v2/cogs/admin.py \
            src/weasel_bot_v2/services/arcadia_manifest.py \
            src/weasel_bot_v2/services/arcadia_quarantine.py \
            src/weasel_bot_v2/services/quarantine.py \
            tests/test_arcadia_quarantine.py \
            tests/test_arcadia_quarantine_apply.py \
            tests/test_quarantine_integrity.py

      - name: Validate candidate
        run: |
          pytest
          ruff check .
          ruff format --check \
            src/weasel_bot_v2/cogs/admin.py \
            src/weasel_bot_v2/services/arcadia_manifest.py \
            src/weasel_bot_v2/services/arcadia_quarantine.py \
            src/weasel_bot_v2/services/quarantine.py \
            tests/test_arcadia_quarantine.py \
            tests/test_arcadia_quarantine_apply.py \
            tests/test_quarantine_integrity.py
          pyright

      - name: Commit validated files
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/weasel_bot_v2/cogs/admin.py \
            src/weasel_bot_v2/services/arcadia_manifest.py \
            src/weasel_bot_v2/services/arcadia_quarantine.py \
            src/weasel_bot_v2/services/quarantine.py \
            tests/test_arcadia_quarantine.py \
            tests/test_arcadia_quarantine_apply.py \
            tests/test_quarantine_integrity.py
          if git diff --cached --quiet; then
            echo "No candidate changes to commit."
          else
            git commit -m "Apply validated Arcadia integration fixes [skip ci]"
            git push origin HEAD:phase-6-4-manifest-integration
          fi
