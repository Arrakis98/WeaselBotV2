name: Unified quarantine core update

on:
  push:
    branches:
      - unified-quarantine-routing

permissions:
  contents: write

jobs:
  apply:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: unified-quarantine-routing
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Apply core routing changes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace(path: str, old: str, new: str, count: int = -1) -> None:
              file = Path(path)
              text = file.read_text(encoding="utf-8")
              if old not in text:
                  if new in text:
                      return
                  raise SystemExit(f"missing patch target in {path}: {old[:60]!r}")
              file.write_text(text.replace(old, new, count), encoding="utf-8")

          replace(
              "src/weasel_bot_v2/config.py",
              'Path("/library_admin/quarantine/super_disliked")',
              'Path("/library_admin/quarantine")',
          )
          replace(
              ".env.example",
              "QUARANTINE_HOST_PATH=./quarantine/super_disliked",
              "QUARANTINE_HOST_PATH=./quarantine",
          )
          replace(
              "compose.example.yml",
              "${QUARANTINE_HOST_PATH:-./quarantine/super_disliked}:/library_admin/quarantine/super_disliked:rw",
              "${QUARANTINE_HOST_PATH:-./quarantine}:/library_admin/quarantine:rw",
          )
          replace(
              "config.example.yaml",
              "/library_admin/quarantine/super_disliked",
              "/library_admin/quarantine",
          )
          replace(
              "src/weasel_bot_v2/bot.py",
              '    "weasel_bot_v2.cogs.music",\n)',
              '    "weasel_bot_v2.cogs.music",\n    "weasel_bot_v2.cogs.quarantine_admin",\n)',
          )

          repository_methods = '''    def list_active_records(self) -> list[QuarantineRecord]:
              with self.database.connect() as connection:
                  rows = connection.execute(
                      """
                      SELECT
                          id,
                          track_id,
                          guild_id,
                          requested_by_user_id,
                          reason,
                          original_relative_path,
                          quarantine_relative_path,
                          quarantined_at,
                          restored_at,
                          state
                      FROM track_quarantine
                      WHERE state = 'quarantined'
                      ORDER BY id ASC
                      """
                  ).fetchall()
              return [_record_from_row(row) for row in rows]

              def update_relative_path(self, record_id: int, relative_path: str) -> None:
              with self.database.connect() as connection:
                  connection.execute(
                      """
                      UPDATE track_quarantine
                      SET quarantine_relative_path = ?
                      WHERE id = ? AND state = 'quarantined'
                      """,
                      (relative_path, record_id),
                  )
                  connection.commit()

          '''.replace("\n              def update_relative_path", "\n    def update_relative_path")
          replace(
              "src/weasel_bot_v2/repositories/quarantine.py",
              "    def mark_restored(self, record_id: int) -> None:\n",
              repository_methods + "    def mark_restored(self, record_id: int) -> None:\n",
          )

          q = "src/weasel_bot_v2/services/quarantine.py"
          replace(
              q,
              "LOGGER = logging.getLogger(__name__)\n",
              "LOGGER = logging.getLogger(__name__)\n\n"
              '_QUARANTINE_BUCKETS = {"superdislike", "mediatool"}\n'
              '_LEGACY_QUARANTINE_BUCKET = "super_disliked"\n',
          )
          replace(
              q,
              "    def preview_superdisliked(self, guild_id: int) -> PurgePreview:\n",
              "    def preview_superdisliked(\n"
              "        self,\n"
              "        guild_id: int,\n"
              "        *,\n"
              "        current_track_id: int | None = None,\n"
              "    ) -> PurgePreview:\n",
          )
          replace(
              q,
              "            if not track.is_available:\n"
              "                continue\n"
              "            reason = self._cannot_move_reason(track)\n",
              "            if not track.is_available:\n"
              "                continue\n"
              "            if current_track_id is not None and track.id == current_track_id:\n"
              "                cannot_move.append(\n"
              "                    f\"{_track_title(track)}: track is currently playing\"\n"
              "                )\n"
              "                continue\n"
              "            reason = self._cannot_move_reason(track)\n",
              1,
          )
          replace(
              q,
              "            destination=self.quarantine_path.as_posix(),\n",
              '            destination=(self.quarantine_path / "superdislike").as_posix(),\n',
          )
          replace(
              q,
              "        reason: str,\n"
              "        expected_sha256: str | None = None,\n"
              "    ) -> QuarantineMoveResult:\n",
              "        reason: str,\n"
              "        expected_sha256: str | None = None,\n"
              "        bucket: str | None = None,\n"
              "    ) -> QuarantineMoveResult:\n",
              1,
          )
          replace(
              q,
              "            reason=reason,\n"
              "            expected_sha256=expected_sha256,\n"
              "            builder=builder,\n",
              "            reason=reason,\n"
              "            expected_sha256=expected_sha256,\n"
              "            bucket=bucket,\n"
              "            builder=builder,\n",
              1,
          )
          replace(
              q,
              '                reason="purge_superdisliked",\n'
              "                expected_sha256=None,\n"
              "                builder=builder,\n",
              '                reason="purge_superdisliked",\n'
              "                expected_sha256=None,\n"
              '                bucket="superdislike",\n'
              "                builder=builder,\n",
          )
          replace(
              q,
              "            source = _resolved_child(self.quarantine_path, quarantine_relative.as_posix())\n",
              "            source = self._quarantine_source(quarantine_relative)\n",
          )
          source_method = '''    def _quarantine_source(self, relative: Path) -> Path:
              direct = _resolved_child(self.quarantine_path, relative.as_posix())
              if direct.is_file():
                  return direct
              if relative.parts and relative.parts[0] in _QUARANTINE_BUCKETS:
                  return direct
              legacy_relative = Path(_LEGACY_QUARANTINE_BUCKET, *relative.parts)
              legacy = _resolved_child(self.quarantine_path, legacy_relative.as_posix())
              return legacy if legacy.is_file() else direct

          '''
          replace(q, "    def _quarantine_one(\n", source_method + "    def _quarantine_one(\n")
          replace(
              q,
              "        reason: str,\n"
              "        expected_sha256: str | None,\n"
              "        builder: _QuarantineResultBuilder,\n",
              "        reason: str,\n"
              "        expected_sha256: str | None,\n"
              "        bucket: str | None,\n"
              "        builder: _QuarantineResultBuilder,\n",
          )
          replace(
              q,
              "            relative = safe_relative_path(track.relative_path)\n"
              "            source = _resolved_child(self.admin_music_path, relative.as_posix())\n"
              "            destination = _collision_safe_path(\n"
              "                _resolved_child(self.quarantine_path, relative.as_posix())\n"
              "            )\n",
              "            relative = safe_relative_path(track.relative_path)\n"
              "            source = _resolved_child(self.admin_music_path, relative.as_posix())\n"
              "            resolved_bucket = _validated_bucket(\n"
              "                bucket or quarantine_bucket_for_reason(reason)\n"
              "            )\n"
              "            destination_relative = Path(resolved_bucket, *relative.parts)\n"
              "            destination = _collision_safe_path(\n"
              "                _resolved_child(\n"
              "                    self.quarantine_path,\n"
              "                    destination_relative.as_posix(),\n"
              "                )\n"
              "            )\n",
          )
          helpers = '''def quarantine_bucket_for_reason(reason: str) -> str:
              return "mediatool" if reason.startswith("arcadia_manifest:") else "superdislike"


          def _validated_bucket(bucket: str) -> str:
              normalized = bucket.strip().casefold()
              if normalized not in _QUARANTINE_BUCKETS:
                  raise ValueError("unsupported quarantine bucket")
              return normalized


          '''
          replace(
              q,
              "def _resolved_child(root: Path, relative_path: str) -> Path:\n",
              helpers + "def _resolved_child(root: Path, relative_path: str) -> Path:\n",
          )

          replace(
              "src/weasel_bot_v2/services/arcadia_quarantine.py",
              "                reason=f\"arcadia_manifest:{operation.reason}:{digest_prefix}\",\n"
              "                expected_sha256=operation.source_sha256,\n",
              "                reason=f\"arcadia_manifest:{operation.reason}:{digest_prefix}\",\n"
              "                expected_sha256=operation.source_sha256,\n"
              '                bucket="mediatool",\n',
          )
          PY

      - name: Format and commit
        run: |
          python -m pip install ruff
          ruff format src
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Implement unified quarantine core routing [skip ci]"
          git push origin HEAD:unified-quarantine-routing
